<h1>Self-Assessment Quiz</h1>

<form id="quizForm">

<h3>1. HTML stands for:</h3>
<input type="text" id="q1">

<h3>2. Which language styles web pages?</h3>
<input type="radio" name="q2" value="css"> CSS
<input type="radio" name="q2" value="html"> HTML

<h3>3. JavaScript is used for:</h3>
<input type="radio" name="q3" value="interactivity"> Interactivity
<input type="radio" name="q3" value="structure"> Structure

<h3>4. Hyperlink tag?</h3>
<input type="radio" name="q4" value="a"> &lt;a&gt;
<input type="radio" name="q4" value="p"> &lt;p&gt;

<h3>5. Select ALL web technologies:</h3>
<input type="checkbox" name="q5" value="html">HTML
<input type="checkbox" name="q5" value="css">CSS
<input type="checkbox" name="q5" value="java">Java

<br><br>

<button type="button" onclick="gradeQuiz()">Submit</button>
<button type="reset" onclick="resetQuiz()">Reset</button>

</form>

<div id="results"></div>

</body>
</html>
