<!-- Include Head and Nav from index.html -->
<section class="quiz-container">
    <h1>SEO Proficiency Quiz</h1>
    <form id="quizForm">
        <h3>1. What does HTML stand for?</h3>
        <input type="text" id="q1" placeholder="Enter full name...">

        <h3>2. Which language is used for layout and design?</h3>
        <input type="radio" name="q2" value="html"> HTML<br>
        <input type="radio" name="q2" value="css"> CSS<br>
        <input type="radio" name="q2" value="js"> JavaScript

        <h3>3. What is the most important factor in Off-Page SEO?</h3>
        <input type="radio" name="q3" value="images"> Large Images<br>
        <input type="radio" name="q3" value="backlinks"> Backlinks<br>
        <input type="radio" name="q3" value="colors"> Color Scheme

        <h3>4. How do search engines find new pages?</h3>
        <input type="radio" name="q4" value="guessing"> Guessing<br>
        <input type="radio" name="q4" value="crawling"> Crawling<br>

        <br>
        <button type="button" onclick="gradeQuiz()" style="padding:10px 20px; background:var(--primary); color:white; border:none; cursor:pointer;">Submit Quiz</button>
    </form>
    <div id="results"></div>
</section>
